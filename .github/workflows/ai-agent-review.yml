name: Code Review Agent

on:
  push:
    branches:
      - 'hermes/**'
  pull_request:
    branches:
      - main

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
      
      - name: GitHub CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          languages: javascript-typescript

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Type Check
        run: npm run type-check || echo "::warning::Type check failed"
      
      - name: Lint
        run: npm run lint || echo "::warning::Lint failed"
      
      - name: Build
        run: npm run build || echo "::warning::Build failed"
      
      - name: Reviewdog Lint Annotations
        uses: reviewdog/action-lint@v1
        with:
          reporter: github-pr-review
          level: warning

  summary:
    name: Review Summary
    runs-on: ubuntu-latest
    needs: [security-scan, code-quality]
    if: always()
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const context = github.context;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            const securityResult = '${{ needs.security-scan.result }}';
            const qualityResult = '${{ needs.code-quality.result }}';
            
            let body = '## 🔍 Code Review Agent Summary\n\n';
            body += '| Check | Status |\n';
            body += '|-------|--------|\n';
            body += `| Security Scan | ${securityResult === 'success' ? '✅ Pass' : '⚠️ Issues Found'} |\n`;
            body += `| Code Quality | ${qualityResult === 'success' ? '✅ Pass' : '⚠️ Issues Found'} |\n\n`;
            body += '---\n';
            body += '**Next**: Human review required before merge to main.\n\n';
            body += '<sub>SharkQuant AI Agent</sub>';
            
            if (context.payload.pull_request) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            }
            
            const conclusion = (securityResult === 'success' && qualityResult === 'success') ? 'success' : 'failure';
            await github.rest.checks.create({
              owner, repo,
              name: 'Code Review Agent',
              head_sha: context.sha,
              status: 'completed',
              conclusion,
              output: {
                title: 'Code Review Complete',
                summary: body
              }
            });
