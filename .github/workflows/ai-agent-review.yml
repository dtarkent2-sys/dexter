name: AI Agent Code Review

on:
  push:
    branches:
      - 'hermes/**'
  pull_request:
    branches:
      - main

jobs:
  ai-agent-review:
    name: AI Agent Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Get Changed Files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
          else
            BASE=HEAD~1
            HEAD=HEAD
          fi
          
          FILES=$(git diff --name-only $BASE $HEAD | tr '\n' ',' | sed 's/,$//')
          DIFF=$(git diff $BASE $HEAD)
          
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "diff<<EOFDIFF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOFDIFF" >> $GITHUB_OUTPUT
      
      - name: AI Code Review with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          timeout_minutes: 15
          prompt: |
            You are a senior code reviewer for SharkQuant, a quant trading firm.
            
            Review the following code changes for:
            
            1. **Security Issues**
               - Exposed secrets/API keys
               - Authentication/authorization flaws
               - SQL injection, XSS, command injection
               - Unsafe deserialization
               - Insecure data handling
            
            2. **Bugs & Logic Errors**
               - Null/undefined handling
               - Race conditions
               - Edge cases not handled
               - Off-by-one errors
               - Type mismatches
            
            3. **Performance Issues**
               - N+1 queries
               - Unnecessary re-renders
               - Memory leaks
               - Inefficient algorithms
            
            4. **Code Quality**
               - Violates project conventions
               - Missing error handling
               - Poor naming
               - Overly complex logic
               - Missing tests
            
            5. **Trading-Specific Concerns**
               - Numerical precision issues
               - Floating point comparisons
               - Timezone handling
               - Market data edge cases
            
            Format your response as:
            
            ## 🔍 AI Code Review
            
            ### Summary
            <2-3 sentence overview>
            
            ### 🚨 Critical Issues
            - [ ] Issue description (file:line)
              ```suggestion
              fix
              ```
            
            ### ⚠️ Warnings
            - [ ] Issue description (file:line)
            
            ### 💡 Suggestions
            - [ ] Improvement suggestion
            
            ### ✅ Good Patterns
            - What was done well
            
            Be specific, actionable, and concise. Only flag real issues.
            
            DIFF TO REVIEW:
            ${{ steps.changed.outputs.diff }}
      
      - name: Post Review Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const context = github.context;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            let body = '## 🤖 AI Agent Code Review Complete\n\n';
            body += 'Review performed by Claude 4 Sonnet\n\n';
            body += '### Checks Performed:\n';
            body += '- ✅ Security scan (secrets, auth, injection)\n';
            body += '- ✅ Bug detection (logic, types, edge cases)\n';
            body += '- ✅ Performance analysis\n';
            body += '- ✅ Code quality review\n';
            body += '- ✅ Trading-specific concerns\n\n';
            body += '---\n';
            body += '**Status**: Review complete. Ready for human approval before merge to main.\n\n';
            body += '<sub>Generated by SharkQuant AI Agent</sub>';
            
            if (context.payload.pull_request) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            }
            
            // Set check status
            const check = await github.rest.checks.create({
              owner, repo,
              name: 'AI Agent Code Review',
              head_sha: context.sha,
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'AI Code Review Complete',
                summary: 'Automated code review performed by Claude 4 Sonnet'
              }
            });
