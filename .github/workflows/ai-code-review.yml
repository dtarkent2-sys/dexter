name: AI Code Review

on:
  push:
    branches:
      - 'hermes/**'
  pull_request:
    branches:
      - main

jobs:
  ai-review:
    name: AI Code Reviewer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get Changed Files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "files=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} | tr '\n' ' ')" >> $GITHUB_OUTPUT
          else
            echo "files=$(git diff --name-only HEAD~1 HEAD | tr '\n' ' ')" >> $GITHUB_OUTPUT
          fi
      
      - name: AI Code Review
        uses: reviewdog/action-ai-code-review@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reviewdog_reporter: github-pr-review
          level: warning
          filter_mode: diff_context
      
      - name: Post Review Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const context = github.context;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            let body = '## 🤖 AI Code Review Summary\n\n';
            body += '- **Security**: Scanned for secrets and vulnerabilities\n';
            body += '- **Bugs**: Static analysis for common issues\n';
            body += '- **Quality**: Style, complexity, best practices\n\n';
            body += 'Review complete. Ready for human review before merge to main.';
            
            if (context.payload.pull_request) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            }
